<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>可转债抢权配售监控</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>可转债抢权配售监控</h1>
    </div>

    <div class="actions">
      <button id="reloadBtn">刷新数据</button>
      <button id="exportBtn" class="secondary">导出 CSV</button>
    </div>
  </header>

  <section class="panel filters">
    <label>
      未来天数
      <input id="days" type="number" min="1" max="365" value="45" />
    </label>

    <label>
      目标配售手数
      <input id="targetLots" type="number" min="1" max="100" value="1" />
    </label>

    <label>
      统一预估上市价
      <input id="expectedPrice" type="number" min="0" max="200" step="0.1" placeholder="0=默认估值" />
    </label>

    <label>
      假设正股回撤 %
      <input id="stockDropPct" type="number" min="0" max="50" step="0.1" value="0" />
    </label>

    <label class="checkbox">
      <input id="onlyActive" type="checkbox" checked />
      只看未过登记日
    </label>

    <button id="queryBtn">重新计算</button>
  </section>

  <section class="statusbar">
    <span id="summary">加载中...</span>
    <span id="lastRefresh"></span>
  </section>

  <section id="errorBox" class="error hidden"></section>
  <section id="warningBox" class="warning hidden"></section>

  <main class="table-wrap">
    <table id="bondTable">
      <thead>
        <tr>
          <th>状态</th>
          <th>转债</th>
          <th>正股</th>
          <th>股权登记日</th>
          <th>申购日</th>
          <th>配售码</th>
          <th>每股获配额</th>
          <th>买入股数</th>
          <th>正股金额</th>
          <th>转股价值</th>
          <th>信用评级</th>
          <th>预估上市价</th>
          <th>转债收益</th>
          <th>安全垫</th>
          <th>综合收益</th>
          <th>排序分</th>
          <th>备注</th>
        </tr>
      </thead>

      <tbody></tbody>
    </table>
  </main>

  <script src="./app.js"></script>
</body>
</html>
