name: Build data and deploy Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    # 北京/新加坡时间工作日 09:07-16:07，每小时刷新一次。UTC = CST - 8。
    # 如想更频繁，可改成 '7/30 1-8 * * 1-5'，但 GitHub 定时任务不保证准点。
    - cron: "7 1-8 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate convertible bond data
        run: python scripts/generate_data.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
